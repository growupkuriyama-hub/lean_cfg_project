name: Lean CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    name: Build and check Lean files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean and build project
        uses: leanprover/lean-action@v1
        with:
          # Run the ordinary Lake build.  This uses the repository's
          # lean-toolchain and lakefile.lean/lakefile.toml.
          build: true
          test: false
          lint: false
          use-mathlib-cache: auto

      - name: Check MCFG experimental file directly
        run: |
          lake env lean LeanCfgProject/MCFG/FI_v2_1_FixedObservation.lean
