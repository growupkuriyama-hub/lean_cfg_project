name: Lean CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lean:
    name: Check MCFG experimental Lean file
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean and Mathlib cache only
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          mk_all-check: false
          use-mathlib-cache: auto

      - name: Check fixed-observation experiment directly
        run: |
          lake env lean LeanCfgProject/MCFG/FI_v2_1_FixedObservation.lean
