name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
          lint: false

      - name: Build JALC summary
        run: lake build LeanCfgProject.JALC.Summary

      - name: Build JALC transport invariants
        run: lake build LeanCfgProject.JALC.Transport

      - name: Build JALC bracketing nonrigidity check
        run: lake build LeanCfgProject.JALC.Bracketing

      - name: Build JALC productive-first witness
        run: lake build LeanCfgProject.JALC.ProductiveFirst

      - name: Build JALC paper-facing checks
        run: lake build LeanCfgProject.JALC.PaperFacing

      - name: Build JALC inverse kernel
        run: lake build LeanCfgProject.JALC.InverseKernel

      - name: Build JALC round-trip kernel
        run: lake build LeanCfgProject.JALC.RoundTripKernel

      - name: Reject proof-bypassing placeholders in JALC modules
        run: |
          ! grep -R "sorry" LeanCfgProject/JALC
          ! grep -R "admit" LeanCfgProject/JALC
          ! grep -R "axiom" LeanCfgProject/JALC