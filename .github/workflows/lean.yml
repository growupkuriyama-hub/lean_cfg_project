name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Check Step25 module
        run: lake build LeanCfgProject.Step25_Test

      - name: Check FullArchitecture module
        run: lake build LeanCfgProject.FullArchitecture_Test

      - name: Reject sorry
        run: |
          if grep -R -nE '\bsorry\b' LeanCfgProject --include="*.lean"; then
            echo "::error::sorry found in Lean files"
            exit 1
          fi

      - name: Reject axiom
        run: |
          if grep -R -nE '^[[:space:]]*axiom\b' LeanCfgProject --include="*.lean"; then
            echo "::error::axiom found in Lean files"
            exit 1
          fi

      - name: Check StateSemantics module
        run: lake build LeanCfgProject.StateSemantics

      - name: Check ResidualConcept module
        run: lake build LeanCfgProject.ResidualConcept

      - name: Check LanguageQuotient module
        run: lake build LeanCfgProject.LanguageQuotient

      - name: Check DescriptorSemantics module
        run: lake build LeanCfgProject.DescriptorSemantics


      - name: Check DescriptorResidualSemantics module
        run: lake build LeanCfgProject.DescriptorResidualSemantics


      - name: Check ObservationCounterexample module
        run: lake build LeanCfgProject.ObservationCounterexample

      - name: Check ObservationCounterexample v2 module
        run: lake build LeanCfgProject.ObservationCounterexample_v2

      - name: Check ObservationFinite module
        run: lake build LeanCfgProject.ObservationFinite

      - name: Check CarrierConceptSemantics module
        run: lake build LeanCfgProject.CarrierConceptSemantics

      - name: Check FiniteSaturation module
        run: lake build LeanCfgProject.FiniteSaturation

      - name: Check ObservationSignatureCounterexample module
        run: lake build LeanCfgProject.ObservationSignatureCounterexample

      - name: Check SemanticBridgeSummary module
        run: lake build LeanCfgProject.SemanticBridgeSummary


      - name: Check FrameSoundness module
        run: lake build LeanCfgProject.FrameSoundness

      - name: Check CarrierSaturationCorrectness module
        run: lake build LeanCfgProject.CarrierSaturationCorrectness


      - name: Check FrameSoundness module
        run: lake build LeanCfgProject.FrameSoundness

      - name: Check CarrierSaturationCorrectness module
        run: lake build LeanCfgProject.CarrierSaturationCorrectness

      - name: Check SaturationFrameBridge module
        run: lake build LeanCfgProject.SaturationFrameBridge
