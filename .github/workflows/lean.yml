name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Lean and verify certificates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false

      - name: Build MCFG experiment modules
        run: |
          lake build LeanCfgProject.MCFG.FI_v2_1_FixedObservation
          lake build LeanCfgProject.MCFG.Basic
          lake build LeanCfgProject

      - name: Run all Python scripts under PrimDyck
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r -d '' file; do
            echo "Running: $file"
            python3 "$file"
          done < <(
            find LeanCfgProject/PrimDyck \
              -type f \
              -name '*.py' \
              -print0 |
            sort -z
          )