name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
          lint: false

      - name: Build JALC full-frame reachability kernel
        run: lake build LeanCfgProject.JALC.FullFrameReachabilityKernel

      - name: Build JALC full kept-correctness kernel
        run: lake build LeanCfgProject.JALC.FullKeptCorrectnessKernel

      - name: Build JALC full kept paper-facing checks
        run: lake build LeanCfgProject.JALC.PaperFacingFullKept

      - name: Build JALC full main theorem package
        run: lake build LeanCfgProject.JALC.PaperFacingFullMain

      - name: Build JALC full finite main package
        run: lake build LeanCfgProject.JALC.PaperFacingFullFiniteMain

      - name: Build JALC finite fixed-point kernel
        run: lake build LeanCfgProject.JALC.PaperFacingFixedPoint

      - name: Build JALC algorithmic extraction kernel
        run: lake build LeanCfgProject.JALC.PaperFacingAlgorithmicExtraction

      - name: Reject proof-bypassing placeholders in JALC modules
        run: |
          ! grep -R "sorry" LeanCfgProject/JALC
          ! grep -R "admit" LeanCfgProject/JALC
          ! grep -R "axiom" LeanCfgProject/JALC
