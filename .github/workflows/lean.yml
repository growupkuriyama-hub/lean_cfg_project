name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and check Lean files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Lean/Lake and restore the mathlib cache, but do not let the
      # action run its default `lake build`/direct checks for us.
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          build: false

      # Do not run `lake env lean LeanCfgProject.lean` directly here.
      # Direct `lean` expects imported modules to already have .olean files.
      # Lake builds the dependency chain in the right order and creates them.
      - name: Build MCFG experiment modules
        run: |
          lake build LeanCfgProject.MCFG.FI_v2_1_FixedObservation
          lake build LeanCfgProject.MCFG.Basic
          lake build LeanCfgProject
