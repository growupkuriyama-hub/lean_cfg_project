name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Check Step25_Test.lean
        run: lake env lean -R . Step25_Test.lean

      - name: Check FullArchitecture_Test.lean
        run: lake env lean -R . FullArchitecture_Test.lean

      - name: Reject sorry
        run: |
          if grep -R -n "sorry" --include="*.lean" .; then
            echo "::error::sorry found in Lean files"
            exit 1
          fi