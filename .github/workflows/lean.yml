name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Check Step25 module
        run: lake build LeanCfgProject.Step25_Test

      - name: Check FullArchitecture module
        run: lake build LeanCfgProject.FullArchitecture_Test

      - name: Reject sorry
        run: |
          if grep -R -n "sorry" --include="*.lean" LeanCfgProject; then
            echo "::error::sorry found in Lean files"
            exit 1
          fi