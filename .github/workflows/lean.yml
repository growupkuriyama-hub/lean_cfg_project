name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and check Lean files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean and Lake
        uses: leanprover/lean-action@v1
        with:
          build: false
          use-mathlib-cache: true

      - name: Check MCFG Basic directly
        run: lake env lean LeanCfgProject/MCFG/Basic.lean

      - name: Check FI v2.1 fixed-observation file directly
        run: lake env lean LeanCfgProject/MCFG/FI_v2_1_FixedObservation.lean
