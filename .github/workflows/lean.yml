name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Reject placeholder proof command
        run: |
          if grep -R -nE '\bsorry\b' LeanCfgProject --include="*.lean"; then
            echo "::error::placeholder proof command found in Lean files"
            exit 1
          fi

      - name: Reject project-level primitive declarations
        run: |
          if grep -R -nE '^[[:space:]]*axiom\b' LeanCfgProject --include="*.lean"; then
            echo "::error::project-level primitive declaration found in Lean files"
            exit 1
          fi

      # ------------------------------------------------------------------
      # Current theorem-body experiment target only.
      #
      # Active purpose:
      #   Check the concrete quotient concept-object round-trip layer:
      #     - closed original extents map to closed quotient extents
      #     - closed quotient extents pull back to closed original extents
      #     - preimage-image round trip for original concept closures
      #     - image-preimage round trip on the quotient side
      #     - closure-form quotient-side round trip
      #
      # This is intended to move "Concrete quotient concept-object isomorphism"
      # closer to a checked theorem-body target.
      # ------------------------------------------------------------------

      - name: Check ObservedSyntacticConcreteQuotientConceptIsoSummary
        run: lake build LeanCfgProject.ObservedSyntacticConcreteQuotientConceptIsoSummary

      # ------------------------------------------------------------------
      # Current experiment subtarget.
      # Keep commented out during the first pass because the summary target
      # imports it.  Uncomment for narrower diagnostics.
      # ------------------------------------------------------------------

      # - name: Check ObservedSyntacticConcreteQuotientConceptIso
      #   run: lake build LeanCfgProject.ObservedSyntacticConcreteQuotientConceptIso
      #
