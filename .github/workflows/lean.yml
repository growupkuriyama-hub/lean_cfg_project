name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-step25:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Check Step25_Test.lean
        run: lake env lean Step25_Test.lean

      - name: Reject sorry
        run: |
          if grep -n "sorry" Step25_Test.lean; then
            echo "::error::sorry found in Step25_Test.lean"
            exit 1
          fi