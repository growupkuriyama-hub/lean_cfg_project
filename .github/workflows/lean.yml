name: ObservedResidualConcept Lean CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'lean-toolchain'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'LeanCfgProject/ObservedResidualConcept/**'
      - '.github/workflows/lean.yml'
  pull_request:
    paths:
      - 'lean-toolchain'
      - 'lakefile.lean'
      - 'lake-manifest.json'
      - 'LeanCfgProject/ObservedResidualConcept/**'
      - '.github/workflows/lean.yml'
  workflow_dispatch:

concurrency:
  group: observed-residual-concept-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-observed-residual-concept:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan
        shell: bash
        run: |
          set -euxo pipefail
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean/Lake versions
        shell: bash
        run: |
          set -euxo pipefail
          elan --version
          lean --version
          lake --version

      - name: Restore Lake cache
        uses: actions/cache@v4
        with:
          path: |
            .lake
          key: ${{ runner.os }}-observed-residual-concept-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-observed-residual-concept-
            ${{ runner.os }}-lake-

      - name: Get mathlib cache
        shell: bash
        run: |
          set -euxo pipefail
          lake exe cache get || true

      - name: Build ORC core
        shell: bash
        run: |
          set -euxo pipefail
          lake build LeanCfgProject.ObservedResidualConcept.ObservedResidualConceptCore

      - name: Build cyclic phase-collapse experiment
        shell: bash
        run: |
          set -euxo pipefail
          lake build LeanCfgProject.ObservedResidualConcept.ObservedResidualConceptCyclic

      - name: Build classification transport core
        shell: bash
        run: |
          set -euxo pipefail
          lake build LeanCfgProject.ObservedResidualConcept.ObservedResidualConceptClassificationCore

      - name: Build ORC package entrypoint
        shell: bash
        run: |
          set -euxo pipefail
          lake build LeanCfgProject.ObservedResidualConcept.Basic

      - name: Build reduced reconstruction core
        shell: bash
        run: |
          set -euxo pipefail
          lake build LeanCfgProject.ObservedResidualConcept.ObservedResidualConceptReduced
