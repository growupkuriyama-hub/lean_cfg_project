      #   run: lake build LeanCfgProject.ObservedSyntacticConcreteQuotient
      #
      # - name: Check ObservedSyntacticConcreteQuotientConsequences
      #   run: lake build LeanCfgProject.ObservedSyntacticConcreteQuotientConsequences
      #
