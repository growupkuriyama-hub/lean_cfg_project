name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Reject sorry
        run: |
          if grep -R -nE '\bsorry\b' LeanCfgProject --include="*.lean"; then
            echo "::error::sorry found in Lean files"
            exit 1
          fi

      - name: Reject axiom
        run: |
          if grep -R -nE '^[[:space:]]*axiom\b' LeanCfgProject --include="*.lean"; then
            echo "::error::axiom found in Lean files"
            exit 1
          fi

      # ------------------------------------------------------------------
      # Current experiment targets: v27.2 / CI #180 release-regression push7.
      #
      # Active purpose:
      #   Check the release-regression layer added after commit c6c1705 /
      #   Lean CI #180, culminating in ICSubmissionSummary_v12.
      #
      # Historical experiment records are preserved below as commented-out
      # blocks.  Do not delete them; uncomment selected blocks for broader
      # regression checks or release preparation.
      # ------------------------------------------------------------------

      - name: Check ObservedLearningReleaseRegression v27.2 module
        run: lake build LeanCfgProject.ObservedLearningReleaseRegression_v27_2

      - name: Check PointFrameReleaseRegression v27.2 module
        run: lake build LeanCfgProject.PointFrameReleaseRegression_v27_2

      - name: Check FiniteBasisReleaseRegression v27.2 module
