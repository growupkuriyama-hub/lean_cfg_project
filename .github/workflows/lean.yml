name: Lean CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -e
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean toolchain
        run: |
          set -e
          lean --version
          lake --version

      - name: Restore Lake cache
        uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: ${{ runner.os }}-lake-${{ hashFiles('lakefile.lean', 'lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      - name: Get dependencies
        run: |
          set -e
          lake exe cache get || true
          lake update

      - name: Check JALC directory has no proof-bypassing placeholders
        run: |
          set -e
          if grep -RInE '\b(sorry|admit|axiom)\b' LeanCfgProject/JALC --include='*.lean'; then
            echo "Forbidden proof-bypassing placeholder found in LeanCfgProject/JALC."
            exit 1
          fi

      - name: Build JALC summary target
        run: lake build LeanCfgProject.JALC.Summary

      - name: Build JALC full finite-main target
        run: lake build LeanCfgProject.JALC.PaperFacingFullFiniteMain

      - name: Build JALC full algorithmic agreement target
        run: lake build LeanCfgProject.JALC.PaperFacingFullAlgorithmicAgreement

      - name: Build JALC final artifact target
        run: lake build LeanCfgProject.JALC.PaperFacingFinalArtifact

      - name: Build JALC experiment closure target
        run: lake build LeanCfgProject.JALC.PaperFacingExperimentClosure

      - name: Build JALC stage decidability target
        run: lake build LeanCfgProject.JALC.PaperFacingStageDecidability

      - name: Build JALC rule-stage boundary target
        run: lake build LeanCfgProject.JALC.PaperFacingRuleStageBoundary

      - name: Build JALC list-certificate target
        run: lake build LeanCfgProject.JALC.PaperFacingListCertificate

      - name: Build JALC closure trace-list target
        run: lake build LeanCfgProject.JALC.PaperFacingClosureTraceList

      - name: Build JALC iterator trace-boundary target
        run: lake build LeanCfgProject.JALC.PaperFacingIteratorTraceBoundary

      - name: Build JALC productive-reachable iterator certificate target
        run: lake build LeanCfgProject.JALC.PaperFacingProductiveReachableIteratorCertificate

      - name: Build JALC iterator-from-decidable-iterates target
        run: lake build LeanCfgProject.JALC.PaperFacingIteratorFromDecidableIterates
