name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and build
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build-args: Step25_Test.lean