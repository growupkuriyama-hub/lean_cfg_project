name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Reject placeholder proof command
        run: |
          if grep -R -nE '\bsorry\b' LeanCfgProject --include="*.lean"; then
            echo "::error::placeholder proof command found in Lean files"
            exit 1
          fi

      - name: Reject project-level primitive declarations
        run: |
          if grep -R -nE '^[[:space:]]*axiom\b' LeanCfgProject --include="*.lean"; then
            echo "::error::project-level primitive declaration found in Lean files"
            exit 1
          fi

      # ------------------------------------------------------------------
      # Current theorem-body experiment target only.
      #
      # Active purpose:
      #   Check the concrete observed syntactic quotient specialization:
      #     - quotient type by SameObservedSyntactic S
      #     - quotient multiplication and semigroup law
      #     - projection map, surjectivity, exact kernel
      #     - residual / concept / point / product preservation
      #     - universal property and multiplicative universal property
      #
      # This is intended to move "Actual quotient-monoid specialization"
      # from a future target to a checked theorem-body target.
      # ------------------------------------------------------------------

      - name: Check ObservedSyntacticConcreteQuotientPaperSummary
        run: lake build LeanCfgProject.ObservedSyntacticConcreteQuotientPaperSummary

      # ------------------------------------------------------------------
      # Current experiment subtargets.
      # Keep commented out during the first pass because the summary target
      # imports them.  Uncomment one by one for narrower diagnostics.
      # ------------------------------------------------------------------

