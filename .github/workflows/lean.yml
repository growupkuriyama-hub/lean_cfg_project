name: Lean CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -e
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean toolchain
        run: |
          set -e
          lean --version
          lake --version

      - name: Restore Lake cache
        uses: actions/cache@v4
        with:
          path: |
            .lake
            ~/.elan
          key: ${{ runner.os }}-lake-${{ hashFiles('lakefile.lean', 'lake-manifest.json', 'lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      - name: Get dependencies
        run: |
          set -e
          lake exe cache get || true
          lake update

      - name: Check JALC directory has no proof-bypassing placeholders
        run: |
          set -e
          if grep -RInE '\b(sorry|admit|axiom)\b' LeanCfgProject/JALC --include='*.lean'; then
            echo "Forbidden proof-bypassing placeholder found in LeanCfgProject/JALC."
            exit 1
          fi

      - name: Build JALC concrete two-stage bounded search target
        run: lake build LeanCfgProject.JALC.PaperFacingConcreteTwoStageBoundedSearch

      - name: Build JALC concrete two-stage search certificate target
        run: lake build LeanCfgProject.JALC.PaperFacingConcreteTwoStageSearchCertificate

      - name: Build JALC concrete two-stage search certificate target
        run: lake build LeanCfgProject.JALC.PaperFacingConcreteTwoStageSearchCertificate

      - name: Build JALC bounded-search completeness target
        run: lake build LeanCfgProject.JALC.PaperFacingBoundedSearchCompleteness

      - name: Build JALC concrete two-stage search consistency target
        run: lake build LeanCfgProject.JALC.PaperFacingConcreteTwoStageSearchConsistency

      - name: Build JALC concrete two-stage search success target
        run: lake build LeanCfgProject.JALC.PaperFacingConcreteTwoStageSearchSuccess

      - name: Build JALC bounded-search offset completeness target
        run: lake build LeanCfgProject.JALC.PaperFacingBoundedSearchOffsetCompleteness

      - name: Build JALC bounded-search within-bound target
        run: lake build LeanCfgProject.JALC.PaperFacingBoundedSearchWithinBound

      - name: Build JALC list-growth stabilization target
        run: lake build LeanCfgProject.JALC.PaperFacingListGrowthStabilization
