name: Lean CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
          lint: false

      - name: Build JALC algebra summary
        run: lake build LeanCfgProject.JALC.Summary

      - name: Reject sorry, admit, and axiom in JALC modules
        run: |
          ! grep -R "sorry" LeanCfgProject/JALC
          ! grep -R "admit" LeanCfgProject/JALC
          ! grep -R "axiom" LeanCfgProject/JALC