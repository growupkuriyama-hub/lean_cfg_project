name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check-lean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build: false
          test: false
          lint: false

      - name: Reject sorry
        run: |
          if grep -R -nE '\bsorry\b' LeanCfgProject --include="*.lean"; then
            echo "::error::sorry found in Lean files"
            exit 1
          fi

      - name: Reject axiom
        run: |
          if grep -R -nE '^[[:space:]]*axiom\b' LeanCfgProject --include="*.lean"; then
            echo "::error::axiom found in Lean files"
            exit 1
          fi

      # ------------------------------------------------------------------
      # Current finite-example experiment target only.
      #
      # Active purpose:
      #   Check finite example (1): diamond meet-semilattice monoid.
      #   No release-certificate / summary / package / audit / metadata /
      #   checklist / smoke-test target is active in this workflow.
      # ------------------------------------------------------------------

      - name: Check DiamondSemilatticeAdequacy finite example
        run: lake build LeanCfgProject.DiamondSemilatticeAdequacy

      - name: Check ZMod3FailureExample finite example
        run: lake build LeanCfgProject.ZMod3FailureExample

