name: MCFG2 CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build every MCFG2 module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false

      - name: Verify MCFG2 imports
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -d LeanCfgProject/MCFG2 ]]; then
            echo "::error::LeanCfgProject/MCFG2 does not exist."
            exit 1
          fi

          if grep -RInE             '^[[:space:]]*import[[:space:]]+LeanCfgProject\.MCFG(\.|$)'             LeanCfgProject/MCFG2
          then
            echo "::error::Old LeanCfgProject.MCFG imports remain under MCFG2."
            echo "Replace them with LeanCfgProject.MCFG2 imports."
            exit 1
          fi

      - name: Build every MCFG2 module
        shell: bash
        run: |
          set -euo pipefail

          mapfile -d '' files < <(
            find LeanCfgProject/MCFG2               -type f               -name '*.lean'               -print0 |
            sort -z
          )

          total="${#files[@]}"

          if [[ "$total" -eq 0 ]]; then
            echo "::error::No Lean files were found under LeanCfgProject/MCFG2."
            exit 1
          fi

          echo "Found ${total} Lean files under LeanCfgProject/MCFG2."

          current=0

          for file in "${files[@]}"; do
            current=$((current + 1))

            module="${file%.lean}"
            module="${module//\//.}"

            echo "::group::[${current}/${total}] ${module}"
            lake build "${module}"
            echo "::endgroup::"
          done

          echo "All ${total} MCFG2 modules passed."
